name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.96 + rustfmt
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"
          components: rustfmt
      # Same standard as local `just fmt-check`.
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.96 + clippy
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Same standard as local `just lint`.
      - run: cargo clippy --all-targets --all-features -- -D warnings
